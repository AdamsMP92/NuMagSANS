name: clang-format

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  clang-format:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          python -m pip install --user clang-format==22.1.5
          echo "$(python -m site --user-base)/bin" >> "$GITHUB_PATH"

      - name: Show clang-format version
        run: clang-format --version

      - name: Check C++/CUDA formatting
        run: |
          find src -type f \( -name "*.h" -o -name "*.cu" \) -print0 \
            | xargs -0 clang-format --dry-run --Werror
