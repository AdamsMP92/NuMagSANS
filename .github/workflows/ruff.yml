name: ruff

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: python -m pip install ruff==0.15.17

      - name: Show ruff version
        run: ruff --version

      - name: Run ruff lint
        run: ruff check NuMagSANS examples

      - name: Run ruff format check
        run: ruff format --check NuMagSANS examples
